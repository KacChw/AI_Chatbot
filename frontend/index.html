<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Personal Trainer</title>
    <style>
        :root {
            --primary-color: #d4ff00; /* Neonowa zieleń/żółć sportowa */
            --bg-dark: #121212;
            --chat-bg: #1e1e1e;
            --text-light: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Kontener główny */
        .chat-container {
            width: 100%;
            max-width: 1000px;
            height: 80vh;
            background-color: var(--chat-bg);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        /* Nagłówek */
        .chat-header {
            padding: 20px;
            background-color: #252525;
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
        }

        .chat-header h1 {
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Okno wiadomości */
        #chat-window {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Układ pojedynczej wiadomości (awatar + dymek) */
        .message {
            max-width: 80%;
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .bot-message {
            align-self: flex-start;
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse; /* Awatar użytkownika po prawej stronie */
        }

        /* Wygląd samego tekstu w dymku */
        .text-bubble {
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .bot-message .text-bubble {
            background-color: #333;
            color: var(--text-light);
            border-bottom-left-radius: 2px;
        }

        .user-message .text-bubble {
            background-color: var(--primary-color);
            color: #000;
            font-weight: 500;
            border-bottom-right-radius: 2px;
        }

        /* Styl dla awatarów */
        .chat-logo {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid #444;
        }

        .user-message .chat-logo {
            border-color: var(--primary-color);
        }

        /* Pole wprowadzania */
        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background-color: #252525;
        }

        input[type="text"] {
            flex-grow: 1;
            background-color: #333;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar */
        #chat-window::-webkit-scrollbar {
            width: 6px;
        }
        #chat-window::-webkit-scrollbar-thumb {
            background-color: #444;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h1>Coach AI ⚡</h1>
        </div>

        <div id="chat-window">
            </div>

        <div class="input-area">
            <input type="text" id="inputMessage" placeholder="Write question..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>
    
    <script src="script.js"></script>

</body>
</html>
